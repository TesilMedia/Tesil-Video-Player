<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0f1114" />
    <title>Tesil Video Player</title>
    <style>
      :root {
        --bg: #0f1114;
        --text: #e8eaed;
        --muted: #9aa0a6;
        --accent: #8ab4f8;
        --radius: 10px;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100dvh;
        font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
        background: var(--bg);
        color: var(--text);
      }
      .shell {
        max-width: 960px;
        width: 100%;
        margin: 0 auto;
        padding: 1rem 1.25rem 1.25rem;
      }
      .embed {
        border-radius: var(--radius);
        overflow: hidden;
        background: var(--bg);
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.35);
      }
      .embed iframe {
        display: block;
        width: 100%;
        height: min(calc(100dvh - 2.5rem), 1200px);
        border: 0;
      }
    </style>
  </head>
  <body>
    <div class="shell">
      <div class="embed">
        <iframe
          title="Tesil Video Player"
          src="video-player/"
          loading="lazy"
          allowfullscreen
          allow="fullscreen; picture-in-picture"
          referrerpolicy="strict-origin-when-cross-origin"
        ></iframe>
      </div>
    </div>
  </body>
</html>
