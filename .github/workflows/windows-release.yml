# One portable .exe per release (double-click to run). Build runs under C:\vp so NSIS paths stay short.

name: Windows release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Build portable .exe
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
          ELECTRON_BUILDER_CACHE: C:\eb
        shell: pwsh
        run: |
          $src = Join-Path $env:GITHUB_WORKSPACE "video-player"
          $b = "C:\vp"
          foreach ($p in @($b, $env:ELECTRON_BUILDER_CACHE)) {
            if (Test-Path $p) { Remove-Item $p -Recurse -Force }
            New-Item -ItemType Directory -Force -Path $p | Out-Null
          }

          robocopy $src $b /E /XD node_modules dist /NFL /NDL /NJH /NJS /NP | Out-Host
          if ($LASTEXITCODE -ge 8) { throw "robocopy failed: exit code $LASTEXITCODE" }

          Set-Location $b
          npm install --no-audit --no-fund
          if ($LASTEXITCODE -ne 0) { throw "npm install failed: exit code $LASTEXITCODE" }

          cmd /c "npm run dist > build.log 2>&1"
          $code = $LASTEXITCODE
          if ($code -ne 0) {
            Copy-Item build.log (Join-Path $src "build.log") -Force -ErrorAction SilentlyContinue
            Write-Host "---- build.log (tail 200) ----"
            Get-Content build.log -Tail 200 -ErrorAction SilentlyContinue | ForEach-Object { Write-Host $_ }
            throw "electron-builder failed: exit code $code"
          }

          $distSrc = Join-Path $b "dist"
          $distDest = Join-Path $src "dist"
          New-Item -ItemType Directory -Force -Path $distDest | Out-Null
          Copy-Item (Join-Path $distSrc "*") $distDest -Recurse -Force

      - name: Publish release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: video-player/dist/*.exe
          fail_on_unmatched_files: true
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifact (manual runs)
        if: github.ref_type != 'tag'
        uses: actions/upload-artifact@v4
        with:
          name: CustomVideoPlayer-Windows-Portable
          path: video-player/dist/*.exe

      - name: Logs on failure
        if: failure()
        shell: pwsh
        run: |
          $p = Join-Path $env:GITHUB_WORKSPACE "video-player/build.log"
          if (Test-Path $p) { Get-Content $p -Tail 200 }
