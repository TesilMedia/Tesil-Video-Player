# Builds a Windows NSIS installer (.exe) and attaches it to a GitHub Release when you push a version tag.
# Non-technical users: open Releases and download the Setup .exe (no Node.js required).

name: Windows release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: video-player

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm install

      - name: Build Windows installer (isolated copy)
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
          VPBUILD: ${{ runner.temp }}/vpbuild
        shell: bash
        run: |
          set -euo pipefail
          rm -rf "$VPBUILD"
          mkdir -p "$VPBUILD"
          tar -cf - --exclude=node_modules --exclude=dist . | tar -xf - -C "$VPBUILD"
          cd "$VPBUILD"
          npm install
          npm ls --depth=0
          npm run dist 2>&1 | tee build.log
          mkdir -p "$GITHUB_WORKSPACE/video-player/dist"
          shopt -s nullglob
          exes=(dist/*.exe)
          if [ "${#exes[@]}" -eq 0 ]; then
            echo "No dist/*.exe produced; dist contents:"
            ls -la dist || true
            exit 1
          fi
          cp -f "${exes[@]}" "$GITHUB_WORKSPACE/video-player/dist/"
          cp -f build.log "$GITHUB_WORKSPACE/video-player/build.log"

      - name: Show build output on failure
        if: failure()
        shell: pwsh
        run: |
          if (Test-Path build.log) {
            $snippet = (Get-Content build.log -TotalCount 200 -ErrorAction SilentlyContinue | Out-String)
            Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "## electron-builder log (first 200 lines)"
            Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value '```text'
            Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value $snippet
            Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value '```'
            Get-Content build.log -ErrorAction SilentlyContinue
          }
          if (Test-Path dist) { Get-ChildItem -Recurse dist } else { Write-Host "dist/ missing" }

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ci-failure-logs
          path: |
            video-player/build.log
            video-player/npm-debug.log

      - name: Publish GitHub Release (version tags only)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: video-player/dist/*.exe
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload build artifact (manual test runs)
        if: github.ref_type != 'tag'
        uses: actions/upload-artifact@v4
        with:
          name: custom-video-player-windows-exe
          path: video-player/dist/*.exe
