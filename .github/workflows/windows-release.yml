# Builds a Windows NSIS installer (.exe) and attaches it to a GitHub Release when you push a version tag.
# Non-technical users: open Releases and download the Setup .exe (no Node.js required).

name: Windows release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: video-player

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          # Node 22 has had edge cases with native tooling used by electron-builder on Windows runners.
          node-version: "20"

      - name: Build Windows installer (isolated copy)
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        shell: pwsh
        run: |
          $vp = Join-Path $env:RUNNER_TEMP "vpbuild"
          if (Test-Path $vp) { Remove-Item $vp -Recurse -Force }
          New-Item -ItemType Directory -Path $vp | Out-Null

          # Mirror sources into a clean folder (no node_modules / dist). `tar` is unreliable on Windows runners.
          robocopy . $vp /E /XD node_modules dist /NFL /NDL /NJH /NJS /NP | Out-Host
          $rc = $LASTEXITCODE
          if ($rc -ge 8) { throw "robocopy failed: exit code $rc" }

          Push-Location $vp
          try {
            npm install
            npm ls --depth=0
            # Use cmd so exit codes are reliable when output is redirected (PowerShell `*>` can mask npm failures).
            cmd /c "npm run dist > build.log 2>&1"
            $distCode = $LASTEXITCODE
            if ($distCode -ne 0) {
              $logPath = Join-Path (Get-Location) "build.log"
              $repoLog = Join-Path $env:GITHUB_WORKSPACE "video-player/build.log"
              if (Test-Path $logPath) {
                Copy-Item -Force $logPath $repoLog
                Write-Host "---- $logPath (tail 250 lines) ----"
                Get-Content $logPath -Tail 250 -ErrorAction SilentlyContinue | ForEach-Object { Write-Host $_ }
              } else {
                Write-Host "build.log missing at $logPath"
              }
              throw "npm run dist failed: exit code $distCode"
            }
          } finally {
            Pop-Location
          }

          $outDist = Join-Path $env:GITHUB_WORKSPACE "video-player/dist"
          New-Item -ItemType Directory -Force -Path $outDist | Out-Null

          $distDir = Join-Path $vp "dist"
          $exes = @()
          if (Test-Path $distDir) {
            $exes = Get-ChildItem -Path $distDir -Recurse -Filter *.exe -ErrorAction SilentlyContinue
          }
          if (-not $exes -or $exes.Count -eq 0) {
            Write-Host "No *.exe under $distDir; contents:"
            if (Test-Path $distDir) { Get-ChildItem -Recurse $distDir }
            throw "electron-builder did not produce any dist/**/*.exe"
          }
          Copy-Item -Force $exes.FullName $outDist

          $bl = Join-Path $vp "build.log"
          if (Test-Path $bl) {
            Copy-Item -Force $bl (Join-Path $env:GITHUB_WORKSPACE "video-player/build.log")
          }

      - name: Show build output on failure
        if: failure()
        shell: pwsh
        run: |
          $candidates = @(
            (Join-Path $env:GITHUB_WORKSPACE "video-player/build.log"),
            (Join-Path $env:RUNNER_TEMP "vpbuild/build.log")
          )
          $log = $candidates | Where-Object { Test-Path $_ } | Select-Object -First 1
          if ($log) {
            $snippet = (Get-Content $log -TotalCount 200 -ErrorAction SilentlyContinue | Out-String)
            Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "## electron-builder log (first 200 lines): $log"
            Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value '```text'
            Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value $snippet
            Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value '```'
            Write-Host "---- $log ----"
            Get-Content $log -ErrorAction SilentlyContinue | ForEach-Object { Write-Host $_ }
          } else {
            Write-Host "No build.log found. Checked: $($candidates -join ', ')"
          }
          if (Test-Path dist) { Get-ChildItem -Recurse dist } else { Write-Host "dist/ missing" }

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ci-failure-logs
          path: |
            ${{ runner.temp }}/vpbuild/build.log
            video-player/build.log
            video-player/npm-debug.log

      - name: Publish GitHub Release (version tags only)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: video-player/dist/*.exe
          fail_on_unmatched_files: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload build artifact (manual test runs)
        if: github.ref_type != 'tag'
        uses: actions/upload-artifact@v4
        with:
          name: custom-video-player-windows-exe
          path: video-player/dist/*.exe
