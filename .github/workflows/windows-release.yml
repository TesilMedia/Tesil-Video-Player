# electron-builder --win dir (no NSIS), then 7-Zip SFX → one .exe users download and run.

name: Windows release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Build unpacked app + self-extracting .exe
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
          ELECTRON_BUILDER_CACHE: C:\eb
        shell: pwsh
        run: |
          $src = Join-Path $env:GITHUB_WORKSPACE "video-player"
          $b = "C:\vp"
          foreach ($p in @($b, $env:ELECTRON_BUILDER_CACHE)) {
            if (Test-Path $p) { Remove-Item $p -Recurse -Force }
            New-Item -ItemType Directory -Force -Path $p | Out-Null
          }

          robocopy $src $b /E /XD node_modules dist /NFL /NDL /NJH /NJS /NP | Out-Host
          if ($LASTEXITCODE -ge 8) { throw "robocopy failed: exit code $LASTEXITCODE" }

          Set-Location $b
          npm install --no-audit --no-fund
          if ($LASTEXITCODE -ne 0) { throw "npm install failed: exit code $LASTEXITCODE" }

          cmd /c "npm run dist > build.log 2>&1"
          if ($LASTEXITCODE -ne 0) {
            Copy-Item build.log (Join-Path $src "build.log") -Force -ErrorAction SilentlyContinue
            Get-Content build.log -Tail 200 | ForEach-Object { Write-Host $_ }
            throw "electron-builder failed: exit code $LASTEXITCODE"
          }

          $distRoot = Join-Path $b "dist"
          $unpacked = Join-Path $distRoot "win-unpacked"
          if (-not (Test-Path $unpacked)) {
            $pick = Get-ChildItem $distRoot -Directory -ErrorAction SilentlyContinue | Where-Object {
              (Get-ChildItem $_.FullName -Filter *.exe -File -ErrorAction SilentlyContinue).Count -gt 0
            } | Select-Object -First 1
            if ($pick) { $unpacked = $pick.FullName }
          }
          if (-not (Test-Path $unpacked)) {
            Get-ChildItem $distRoot | ForEach-Object { Write-Host $_.Name }
            throw "No win-unpacked output under dist/"
          }

          $pkg = Get-Content package.json -Raw | ConvertFrom-Json
          $appFolder = $pkg.build.productName
          $exeLeaf = "$appFolder.exe"
          $runRel = "$appFolder\$exeLeaf"

          $wrapRoot = Join-Path $env:RUNNER_TEMP "sfxpackroot"
          if (Test-Path $wrapRoot) { Remove-Item $wrapRoot -Recurse -Force }
          New-Item -ItemType Directory -Force -Path $wrapRoot | Out-Null
          $appDir = Join-Path $wrapRoot $appFolder
          New-Item -ItemType Directory -Force -Path $appDir | Out-Null
          Get-ChildItem -LiteralPath $unpacked | Copy-Item -Destination $appDir -Recurse -Force

          $7z = "C:\Program Files\7-Zip\7z.exe"
          if (-not (Test-Path $7z)) { $7z = "C:\Program Files (x86)\7-Zip\7z.exe" }
          if (-not (Test-Path $7z)) { throw "7-Zip not found on runner" }

          $sevenDir = Split-Path $7z
          $sfx = Join-Path $sevenDir "7zSD.sfx"
          if (-not (Test-Path $sfx)) { $sfx = Join-Path $sevenDir "7z.sfx" }
          if (-not (Test-Path $sfx)) { throw "7-Zip SFX module not found next to 7z.exe" }

          $stg = Join-Path $env:RUNNER_TEMP "sfxpack"
          if (Test-Path $stg) { Remove-Item $stg -Recurse -Force }
          New-Item -ItemType Directory -Force -Path $stg | Out-Null
          $pack7z = Join-Path $stg "app.7z"

          $toPack = Join-Path $wrapRoot $appFolder
          Push-Location $wrapRoot
          & $7z a -t7z -mx5 -r $pack7z ("{0}\*" -f $toPack)
          $z7 = $LASTEXITCODE
          Pop-Location
          if ($z7 -ne 0) { throw "7z archive failed: exit code $z7" }

          $outName = "$appFolder-$($pkg.version)-Windows.exe"
          $outExe = Join-Path $distRoot $outName
          if (Test-Path $outExe) { Remove-Item $outExe -Force }

          $cfg = Join-Path $stg "sfx-config.txt"
          $cfgLines = @(
            ';!@Install@!UTF-8!'
            'Title="Tesil Media Player"'
            'BeginPrompt="This will extract Tesil Media Player into a subfolder and start it."'
            'GUIMode="2"'
            "RunProgram=`"$runRel`""
          )
          [IO.File]::WriteAllLines($cfg, $cfgLines, [Text.UTF8Encoding]::new($false))

          cmd.exe /c ('copy /b "{0}"+"{1}"+"{2}" "{3}"' -f $sfx, $cfg, $pack7z, $outExe)
          if ($LASTEXITCODE -ne 0) { throw "copy /b SFX merge failed: exit code $LASTEXITCODE" }
          if (-not (Test-Path $outExe)) { throw "SFX output missing: $outExe" }
          Write-Host "Built $outExe size=$((Get-Item $outExe).Length)"

          $distDest = Join-Path $src "dist"
          New-Item -ItemType Directory -Force -Path $distDest | Out-Null
          Copy-Item $outExe $distDest -Force

      - name: Publish release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: video-player/dist/*.exe
          fail_on_unmatched_files: true
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifact (manual runs)
        if: github.ref_type != 'tag'
        uses: actions/upload-artifact@v4
        with:
          name: Tesil-Media-Player-Windows
          path: video-player/dist/*.exe

      - name: Logs on failure
        if: failure()
        shell: pwsh
        run: |
          $p = Join-Path $env:GITHUB_WORKSPACE "video-player/build.log"
          if (Test-Path $p) { Get-Content $p -Tail 200 }
