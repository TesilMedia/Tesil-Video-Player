# Unpacked Windows build (electron-builder dir), then zip that folder for GitHub Releases.

name: Windows release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Build portable Windows .zip
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        shell: pwsh
        working-directory: video-player
        run: |
          npm install --no-audit --no-fund
          if ($LASTEXITCODE -ne 0) { throw "npm install failed: exit code $LASTEXITCODE" }

          npm run dist
          if ($LASTEXITCODE -ne 0) { throw "electron-builder failed: exit code $LASTEXITCODE" }

          $unpacked = Join-Path "dist" "win-unpacked"
          if (-not (Test-Path $unpacked)) {
            Write-Host "Contents of dist/:"
            if (Test-Path "dist") { Get-ChildItem "dist" -Force | ForEach-Object { Write-Host $_.Name } }
            throw "dist/win-unpacked not found"
          }

          $pkg = Get-Content package.json -Raw | ConvertFrom-Json
          $product = $pkg.build.productName
          $ver = $pkg.version
          $zipName = "Tesil-Video-Player-$ver-Windows-portable.zip"
          $zipPath = Join-Path (Join-Path (Get-Location).Path "dist") $zipName

          $stage = Join-Path $env:RUNNER_TEMP "tesil-portable"
          if (Test-Path $stage) { Remove-Item $stage -Recurse -Force }
          New-Item -ItemType Directory -Path $stage -Force | Out-Null
          $inner = Join-Path $stage $product
          New-Item -ItemType Directory -Path $inner -Force | Out-Null
          Copy-Item (Join-Path $unpacked '*') -Destination $inner -Recurse -Force

          if (Test-Path $zipPath) { Remove-Item $zipPath -Force }
          Compress-Archive -LiteralPath $inner -DestinationPath $zipPath -CompressionLevel Optimal
          Write-Host "Created $zipPath size=$((Get-Item $zipPath).Length)"

      - name: Publish release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: video-player/dist/*.zip
          fail_on_unmatched_files: true
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifact (manual runs)
        if: github.ref_type != 'tag'
        uses: actions/upload-artifact@v4
        with:
          name: Tesil-Video-Player-Windows
          path: video-player/dist/*.zip

      - name: Logs on failure
        if: failure()
        shell: pwsh
        working-directory: video-player
        run: |
          Write-Host "--- dist (top level) ---"
          if (Test-Path dist) { Get-ChildItem dist -Force | ForEach-Object { Write-Host $_.Name } }
          else { Write-Host "(no dist folder)" }
