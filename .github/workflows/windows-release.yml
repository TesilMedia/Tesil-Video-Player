# Builds one portable Windows .exe and attaches it to a GitHub Release when you push a version tag.
# Non-technical users: open the repo’s Releases page and download the .exe (no Node.js required).

name: Windows portable exe

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: video-player

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm install

      - name: Build portable executable
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        shell: pwsh
        run: |
          cmd /c "npm run dist > build.log 2>&1"
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Show build output on failure
        if: failure()
        shell: pwsh
        run: |
          if (Test-Path build.log) { Get-Content build.log -ErrorAction SilentlyContinue }
          if (Test-Path dist) { Get-ChildItem -Recurse dist } else { Write-Host "dist/ missing" }

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ci-failure-logs
          path: |
            video-player/build.log
            video-player/npm-debug.log

      - name: Publish GitHub Release (version tags only)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: video-player/dist/*.exe
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload build artifact (manual test runs)
        if: github.ref_type != 'tag'
        uses: actions/upload-artifact@v4
        with:
          name: custom-video-player-windows-exe
          path: video-player/dist/*.exe
