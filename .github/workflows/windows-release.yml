# Builds Windows app via electron-builder "dir" (no NSIS), zips win-unpacked, attaches .zip on version tags.
# NSIS/portable still invoke makensis; "dir" avoids that (see electron-builder#8346 / long paths on CI).

name: Windows release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: video-player

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build Windows (dir target) and zip
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        shell: pwsh
        run: |
          $env:ELECTRON_BUILDER_CACHE = Join-Path $env:USERPROFILE "eb-cache"
          New-Item -ItemType Directory -Force -Path $env:ELECTRON_BUILDER_CACHE | Out-Null

          if (Test-Path dist) { Remove-Item dist -Recurse -Force }

          npm install --no-audit --no-fund
          if ($LASTEXITCODE -ne 0) { throw "npm install failed: exit code $LASTEXITCODE" }

          cmd /c "npm run dist > build.log 2>&1"
          $distCode = $LASTEXITCODE
          if ($distCode -ne 0) {
            Write-Host "---- build.log (tail 250 lines) ----"
            if (Test-Path build.log) {
              Get-Content build.log -Tail 250 | ForEach-Object { Write-Host $_ }
            }
            throw "npm run dist failed: exit code $distCode"
          }

          $unpacked = Join-Path (Get-Location) "dist/win-unpacked"
          if (-not (Test-Path $unpacked)) {
            Write-Host "dist/ contents:"
            if (Test-Path dist) { Get-ChildItem -Recurse dist }
            throw "electron-builder did not produce dist/win-unpacked"
          }

          $pkg = Get-Content package.json -Raw | ConvertFrom-Json
          $zipName = "$($pkg.name)-$($pkg.version)-Windows-x64.zip"
          $zipPath = Join-Path (Get-Location) "dist/$zipName"
          if (Test-Path $zipPath) { Remove-Item $zipPath -Force }
          # Archive the whole tree (Compress-Archive -Path "dir\*" is not recursive into subfolders).
          Compress-Archive -Path $unpacked -DestinationPath $zipPath -CompressionLevel Optimal
          if (-not (Test-Path $zipPath)) { throw "failed to create $zipPath" }
          Write-Host "Created $zipPath ($((Get-Item $zipPath).Length) bytes)"

      - name: Show build output on failure
        if: failure()
        shell: pwsh
        run: |
          $log = Join-Path $env:GITHUB_WORKSPACE "video-player/build.log"
          if (Test-Path $log) {
            Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "## electron-builder log (first 200 lines)"
            Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value '```text'
            Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value (Get-Content $log -TotalCount 200 -ErrorAction SilentlyContinue | Out-String)
            Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value '```'
            Get-Content $log | ForEach-Object { Write-Host $_ }
          } else {
            Write-Host "No video-player/build.log (dist may have failed before log write)"
          }
          if (Test-Path dist) { Get-ChildItem -Recurse dist } else { Write-Host "dist/ missing" }

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ci-failure-logs
          path: |
            video-player/build.log
            video-player/npm-debug.log

      - name: Publish GitHub Release (version tags only)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: video-player/dist/*.zip
          fail_on_unmatched_files: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload build artifact (manual test runs)
        if: github.ref_type != 'tag'
        uses: actions/upload-artifact@v4
        with:
          name: custom-video-player-windows-zip
          path: video-player/dist/*.zip
