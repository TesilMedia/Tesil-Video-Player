# Builds the app with electron-builder "dir" (no NSIS), zips the folder to one file for Releases.
# Users: download the .zip, Extract All, run CustomVideoPlayer.exe.

name: Windows release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Build and zip
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
          ELECTRON_BUILDER_CACHE: C:\eb
        shell: pwsh
        run: |
          $src = Join-Path $env:GITHUB_WORKSPACE "video-player"
          $b = "C:\vp"
          foreach ($p in @($b, $env:ELECTRON_BUILDER_CACHE)) {
            if (Test-Path $p) { Remove-Item $p -Recurse -Force }
            New-Item -ItemType Directory -Force -Path $p | Out-Null
          }

          robocopy $src $b /E /XD node_modules dist /NFL /NDL /NJH /NJS /NP | Out-Host
          if ($LASTEXITCODE -ge 8) { throw "robocopy failed: exit code $LASTEXITCODE" }

          Set-Location $b
          npm install --no-audit --no-fund
          if ($LASTEXITCODE -ne 0) { throw "npm install failed: exit code $LASTEXITCODE" }

          cmd /c "npm run dist > build.log 2>&1"
          if ($LASTEXITCODE -ne 0) {
            Copy-Item build.log (Join-Path $src "build.log") -Force -ErrorAction SilentlyContinue
            Get-Content build.log -Tail 200 | ForEach-Object { Write-Host $_ }
            throw "electron-builder failed: exit code $LASTEXITCODE"
          }

          $distRoot = Join-Path $b "dist"
          $unpacked = Join-Path $distRoot "win-unpacked"
          if (-not (Test-Path $unpacked)) {
            $pick = Get-ChildItem $distRoot -Directory -ErrorAction SilentlyContinue | Where-Object {
              (Get-ChildItem $_.FullName -Filter *.exe -File -ErrorAction SilentlyContinue).Count -gt 0
            } | Select-Object -First 1
            if ($pick) { $unpacked = $pick.FullName }
          }
          if (-not (Test-Path $unpacked)) {
            Get-ChildItem $distRoot | ForEach-Object { Write-Host $_.Name }
            throw "No unpacked app under dist/"
          }

          $pkg = Get-Content package.json -Raw | ConvertFrom-Json
          $zipName = "$($pkg.build.productName)-$($pkg.version)-Windows-x64.zip"
          $zipPath = Join-Path $distRoot $zipName
          if (Test-Path $zipPath) { Remove-Item $zipPath -Force }
          & tar.exe -a -c -f $zipPath -C $unpacked .
          if ($LASTEXITCODE -ne 0) { throw "tar failed: exit code $LASTEXITCODE" }

          $distDest = Join-Path $src "dist"
          New-Item -ItemType Directory -Force -Path $distDest | Out-Null
          Copy-Item $zipPath $distDest -Force

      - name: Publish release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: video-player/dist/*.zip
          fail_on_unmatched_files: true
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifact (manual runs)
        if: github.ref_type != 'tag'
        uses: actions/upload-artifact@v4
        with:
          name: CustomVideoPlayer-Windows
          path: video-player/dist/*.zip

      - name: Logs on failure
        if: failure()
        shell: pwsh
        run: |
          $p = Join-Path $env:GITHUB_WORKSPACE "video-player/build.log"
          if (Test-Path $p) { Get-Content $p -Tail 200 }
